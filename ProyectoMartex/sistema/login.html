<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Inicio de sesion</title>
   <script src="https://cdn.tailwindcss.com"></script>
    <!--Configuracion de los colores del proyecto-->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'azul-marino': '#1E3A8A', 'azul-pantera': '#1D4ED8', 'verde-quirurjico': '#10B981' },
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-xl w-96 border-t-4 border-azul-marino">
        <h2 class="text-2xl font-bold text-center text-azul-marino mb-6">Iniciar Sesión</h2>
        <form id="loginForm" class="space-y-4">
            <label class="block text-sm font-medium text-gray-700">Usuario</label>
            <input type="text" id="username" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-azul-pantera" required>
            <div>
            <label class="block text-sm font-medium text-gray-700">Contraseña</label>
            <input type="password" id="password" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-azul-pantera" required>
            <br> <br>
            <div class="flex items-center justify-between">
                <button type="submit" class="w-full bg-azul-pantera text-white py-2 rounded-md hover:bg-azul-marino focus:outline-none focus:ring-2 focus:ring-azul-pantera">Iniciar Sesión</button>
            </div>
        </form>
    </div>
        <script src="js/auth.j"></script>
    </body>
</html>
